<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIA — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0f; --surface: #13141a; --border: rgba(255,255,255,0.07);
    --text: #e8e9f0; --text2: #9a9bb0; --text3: #5a5b70;
    --accent: #7b5ea7; --accent2: #9b6dff; --cyan: #4ecdc4;
    --green: #52e3a8; --red: #ff6b6b; --yellow: #ffd166;
    --glow: rgba(123,94,167,0.35);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .bg-orbs {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .orb {
    position: absolute; border-radius: 50%;
    filter: blur(80px); opacity: 0.15;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb-1 { width:500px;height:500px;background:radial-gradient(circle,#7b5ea7,transparent);top:-100px;left:-100px; }
  .orb-2 { width:400px;height:400px;background:radial-gradient(circle,#4ecdc4,transparent);bottom:-100px;right:-50px;animation-delay:-4s; }
  @keyframes drift { from{transform:translate(0,0)} to{transform:translate(30px,20px)} }

  .login-card {
    position: relative; z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%; max-width: 420px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px var(--border), 0 0 60px var(--glow);
  }
  .logo { display:flex; align-items:center; gap:14px; margin-bottom:36px; }
  .logo-icon {
    width:48px;height:48px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    box-shadow: 0 0 24px var(--glow);
  }
  .logo-icon svg { width:24px;height:24px;color:#fff; }
  .logo-name { font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:var(--text); }
  .logo-sub { font-size:0.78rem;color:var(--text3);letter-spacing:0.06em; }
  h2 { font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700;margin-bottom:8px; }
  .subtitle { color:var(--text2);font-size:0.9rem;margin-bottom:32px; }
  .form-group { margin-bottom:20px; }
  label { display:block;font-size:0.82rem;color:var(--text2);margin-bottom:8px;font-weight:500; }
  input[type=text], input[type=password] {
    width:100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius:12px;
    padding:14px 16px;
    color:var(--text);
    font-size:0.95rem;
    font-family:'DM Sans',sans-serif;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(123,94,167,0.2);
  }
  .btn-login {
    width:100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color:#fff;
    border:none;
    border-radius:12px;
    padding:15px;
    font-size:1rem;
    font-weight:600;
    font-family:'DM Sans',sans-serif;
    cursor:pointer;
    margin-top:8px;
    transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 8px 24px var(--glow);
  }
  .btn-login:hover { opacity:0.9;transform:translateY(-1px); }
  .btn-login:active { transform:translateY(0); }
  .btn-login:disabled { opacity:0.5;cursor:not-allowed; }
  .error-msg {
    background: rgba(255,107,107,0.1);
    border: 1px solid rgba(255,107,107,0.3);
    color: var(--red);
    border-radius:10px;
    padding:12px 16px;
    font-size:0.88rem;
    margin-bottom:20px;
    display:none;
  }
  .demo-hint {
    margin-top:24px;
    padding:14px;
    background:rgba(255,255,255,0.03);
    border:1px solid var(--border);
    border-radius:10px;
    font-size:0.82rem;
    color:var(--text3);
    line-height:1.6;
  }
  .demo-hint strong { color:var(--text2); }
  code { font-family:'JetBrains Mono',monospace;color:var(--cyan);font-size:0.8rem; }
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>

<div class="login-card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </div>
    <div>
      <div class="logo-name">ARIA</div>
      <div class="logo-sub">AI INVENTORY SYSTEM</div>
    </div>
  </div>

  <h2>Welcome back</h2>
  <p class="subtitle">Sign in to your inventory dashboard</p>

  <div class="error-msg" id="errorMsg"></div>

  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="username">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
  </div>

  <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In</button>

  <div class="demo-hint">
    <strong>Demo credentials:</strong><br>
    Admin: <code>admin</code> / <code>admin123</code><br>
    Viewer: <code>viewer</code> / <code>viewer123</code>
  </div>

  <div style="text-align:center;margin-top:20px;font-size:0.86rem;color:#5a5b70">
    Don't have an account? <a href="/signup" style="color:#9b6dff;text-decoration:none;font-weight:500">Create one</a>
  </div>
</div>

<script>
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');

  if (!username || !password) {
    showError('Please enter username and password.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in…';
  err.style.display = 'none';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/chat';
    } else {
      showError(data.error || 'Login failed');
    }
  } catch (e) {
    showError('Network error. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

function showError(msg) {
  const err = document.getElementById('errorMsg');
  err.textContent = msg;
  err.style.display = 'block';
}
</script>
</body>
</html>
